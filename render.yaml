services:
  - type: web
    name: devflow-ai-api
    env: node
    rootDir: .
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @devflow/database migrate:prod && pnpm --filter api... build
    startCommand: pnpm --filter api start:prod
    healthCheckPath: /health/ready
    autoDeploy: true
